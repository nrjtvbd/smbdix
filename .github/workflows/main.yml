name: Auto Update Playlist

on:
  schedule:
    - cron: '0 * * * *' # প্রতি ঘণ্টায় অটো আপডেট হবে
  workflow_dispatch: # চাইলে নিজেও ক্লিক করে রান করতে পারবেন

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Run Script
        run: python update_list.py

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add permanent_list.m3u8
          git commit -m "Auto Update: Fixed Link Maintenance" || exit 0
          git push
